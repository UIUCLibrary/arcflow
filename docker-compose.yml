services:
  # MySQL database for ArchivesSpace
  mysql:
    image: mysql:5.7
    platform: linux/amd64
    container_name: local-archivesspace-mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backup-data/mysql:/backup/mysql:ro  # Read-only backup (should contain archivesspace.sql)
      - ./mysql-entrypoint.sh:/usr/local/bin/custom-entrypoint.sh:ro
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ${MYSQL_DATABASE:-archivesspace}
      MYSQL_USER: ${MYSQL_USER:-as}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-as123}
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    networks:
      - arclight-network
    entrypoint: ["/bin/bash", "/usr/local/bin/custom-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ArchivesSpace 2.6 (custom build from GitHub release)
  archivesspace:
    build:
      context: ./archivesspace
      dockerfile: Dockerfile
    container_name: local-archivesspace
    ports:
      - "8080:8080"  # Staff interface
      - "8081:8081"  # Public interface
      - "8089:8089"  # Backend API
      - "8090:8090"  # Solr admin (disabled, using external Solr)
    environment:
      ASPACE_JAVA_XMX: "-Xmx1g"
      ARCHIVESSPACE_DB_TYPE: "mysql"
      ARCHIVESSPACE_DB_HOST: "mysql"
      ARCHIVESSPACE_DB_PORT: "3306"
      ARCHIVESSPACE_DB_NAME: ${MYSQL_DATABASE:-archivesspace}
      ARCHIVESSPACE_DB_USER: ${MYSQL_USER:-as}
      ARCHIVESSPACE_DB_PASS: ${MYSQL_PASSWORD:-as123}
    volumes:
      - archivesspace-data:/archivesspace/data
      - ./backup-data/archivesspace:/backup/archivesspace:ro
    networks:
      - arclight-network
    depends_on:
      mysql:
        condition: service_healthy

  # Solr for ArcLight and ArchivesSpace
  # Supports two modes:
  #   1. With backups: Restores pre-populated data from backup-data/
  #   2. Without backups: Creates blank cores from configsets/
  solr:
    image: solr:8.11.3
    container_name: local-arclight-solr
    ports:
      - "8983:8983"
    volumes:
      - solr-data:/var/solr
      - ./configsets/blacklight-core:/opt/solr/server/solr/configsets/blacklight-core:ro
      - ./configsets/archivesspace:/opt/solr/server/solr/configsets/archivesspace:ro
      - ./backup-data/blacklight-core:/backup/blacklight-core:ro
      - ./backup-data/archivesspace-solr:/backup/archivesspace-solr:ro
      - ./solr-entrypoint.sh:/usr/local/bin/custom-entrypoint.sh:ro
    environment:
      - SOLR_OPTS=-Dsolr.max.booleanClauses=2048
      - SOLR_HEAP=2g
    entrypoint: ["/bin/bash", "/usr/local/bin/custom-entrypoint.sh"]
    networks:
      - arclight-network

  # ArcLight 1.6.2 (Rails application)
  # Note: ArcLight is OPTIONAL and disabled by default
  # To enable: Run `docker compose --profile arclight up -d`
  # Requires configsets to be populated in ./configsets/blacklight-core/
  arclight:
    build:
      context: ./arclight
      dockerfile: Dockerfile
    container_name: local-arclight-app
    ports:
      - "3000:3000"
    environment:
      SOLR_URL: "http://solr:8983/solr/blacklight-core"
      RAILS_ENV: "development"
      SECRET_KEY_BASE: "development_secret_key_base_change_in_production"
    volumes:
      - ./arclight-data:/app/tmp
    networks:
      - arclight-network
    depends_on:
      - solr
    profiles:
      - arclight

networks:
  arclight-network:
    driver: bridge
volumes:
  mysql-data:
  archivesspace-data:
  solr-data:
